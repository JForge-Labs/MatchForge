{% extends "base.html" %}
{% block title %}Sign up — MatchForge{% endblock %}

{% block content %}
<section class="auth-card">
  <h1>Create your account</h1>
  <p class="auth-sub">We'll email you a confirmation link. No password needed.</p>

  {% if error %}
  <div class="status error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/signup" class="auth-form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autofocus autocomplete="email"
           placeholder="you@example.com" value="{{ email or '' }}">
    <button type="submit" class="btn primary full">Send confirmation link</button>
  </form>

  <p class="auth-foot">Already have an account? <a href="/login">Sign in</a></p>
  <p class="auth-foot"><a href="/">← Back to home</a></p>
</section>
{% endblock %}
