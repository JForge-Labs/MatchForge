{% extends "base.html" %}
{% block title %}Sign in — MatchForge{% endblock %}

{% block content %}
<section class="auth-card">
  <h1>Sign in</h1>
  <p class="auth-sub">We'll email you a sign-in link. No password needed.</p>

  {% if error %}
  <div class="status error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login" class="auth-form">
    <input type="hidden" name="next" value="{{ next }}">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autofocus autocomplete="email"
           placeholder="you@example.com" value="{{ email or '' }}">
    <button type="submit" class="btn primary full">Email me a sign-in link</button>
  </form>

  <p class="auth-foot">New here? <a href="/signup">Create an account</a></p>
  <p class="auth-foot"><a href="/">← Back to home</a></p>
</section>
{% endblock %}
