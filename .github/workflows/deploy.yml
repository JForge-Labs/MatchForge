name: Deploy MatchForge

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deploy target after build
        required: false
        default: none
        type: choice
        options:
          - none
          - stage
          - prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Build and push image
        run: |
          doctl registry login
          docker build -t registry.digitalocean.com/matchforge/web:latest .
          docker push registry.digitalocean.com/matchforge/web:latest

  deploy-stage:
    needs: build
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'stage')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Deploy staging app
        run: doctl apps create-deployment "${{ secrets.DO_DEV_APP_ID }}"

  deploy-prod:
    needs: build
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'prod')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Deploy prod app
        run: doctl apps create-deployment "${{ secrets.DO_PROD_APP_ID }}"