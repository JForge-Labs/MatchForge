# MatchForge staging — dev.match-forge.com (mirrors prod, separate DB)
name: matchforge-dev
region: tor1

services:
  - name: web
    image:
      registry_type: DOCR
      repository: web
      tag: latest
      deploy_on_push:
        enabled: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /health
      initial_delay_seconds: 45
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    envs:
      - key: APP_ENV
        value: staging
        scope: RUN_TIME
      - key: APP_DOMAIN
        value: dev.match-forge.com
        scope: RUN_TIME
      - key: APP_URL
        value: https://dev.match-forge.com
        scope: RUN_TIME
      - key: PORT
        value: "8000"
        scope: RUN_TIME
      - key: RUN_DB_INIT
        value: "true"
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: info
        scope: RUN_TIME
      - key: DATABASE_URL
        value: postgresql://${db.USERNAME}:${db.PASSWORD}@${db.HOSTNAME}:${db.PORT}/${db.DATABASE}?sslmode=require
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        value: __SECRET_KEY__
        scope: RUN_TIME
        type: SECRET
      - key: AUTH_PASSWORD
        value: __AUTH_PASSWORD__
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_HOST
        value: __SMTP_HOST__
        scope: RUN_TIME
      - key: SMTP_PORT
        value: "__SMTP_PORT__"
        scope: RUN_TIME
      - key: SMTP_USER
        value: __SMTP_USER__
        scope: RUN_TIME
      - key: SMTP_PASSWORD
        value: __SMTP_PASSWORD__
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_FROM
        value: __SMTP_FROM__
        scope: RUN_TIME
      - key: SMTP_USE_TLS
        value: "__SMTP_USE_TLS__"
        scope: RUN_TIME
      - key: XAI_API_KEY
        value: __XAI_API_KEY__
        scope: RUN_TIME
        type: SECRET
      - key: XAI_VISION_MODEL
        value: grok-4.3
        scope: RUN_TIME
      - key: XAI_TEXT_FAST
        value: grok-4.20-0309-non-reasoning
        scope: RUN_TIME
      - key: XAI_TEXT_REASON
        value: grok-4.20-0309-reasoning
        scope: RUN_TIME
      - key: BILLING_ENABLED
        value: "false"
        scope: RUN_TIME
      - key: SIGNUP_GRANT_TOKENS
        value: "500"
        scope: RUN_TIME
      - key: SEED_MIN_TOKENS
        value: "500"
        scope: RUN_TIME
      - key: STRIPE_SECRET_KEY
        value: __STRIPE_SECRET_KEY__
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PUBLISHABLE_KEY
        value: __STRIPE_PUBLISHABLE_KEY__
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        value: __STRIPE_WEBHOOK_SECRET__
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRODUCT_ID
        value: __STRIPE_PRODUCT_ID__
        scope: RUN_TIME
      - key: TOKENS_PER_USD
        value: "20"
        scope: RUN_TIME
      - key: MIN_TOPUP_USD
        value: "10"
        scope: RUN_TIME
      - key: DEFAULT_TOPUP_USD
        value: "20"
        scope: RUN_TIME

databases:
  - name: db
    engine: PG
    version: "16"

domains:
  - domain: dev.match-forge.com
    type: PRIMARY