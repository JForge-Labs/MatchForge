# MatchForge dev services stack.
# Native postgres + redis may already run on the host; this compose file
# provides isolated postgres/redis for local development. AI runs via the
# xAI Grok cloud API (XAI_API_KEY) — no local model service required.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: matchforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: matchforge_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
